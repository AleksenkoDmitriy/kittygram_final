version: '3.8'

services:
  db:
    image: postgres:13
    env_file:
      - .env
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    image: ${DOCKER_USERNAME}/kittygram_backend:latest
    env_file: .env
    depends_on:
      - db
    volumes:
      - static:/app/static
      - media:/app/media

  frontend:
    image: ${DOCKER_USERNAME}/kittygram_frontend:latest
    command: cp -r /app/build/. /static/
    volumes:
      - static:/static

  gateway:
    image: ${DOCKER_USERNAME}/kittygram_gateway:latest
    ports:
      - "80:80"
    depends_on:
      - backend
    volumes:
      - static:/static
      - media:/media

volumes:
  pg_data:
  static:
  media: